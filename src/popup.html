<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Bark</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 320px;
      min-height: 200px;
      background: #1a1a2e;
      color: #e0e0e0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      font-size: 14px;
      line-height: 1.5;
    }

    /* ---- Header ---- */
    .header {
      background: #16213e;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 1px solid #2a2a4a;
    }

    .header h1 {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 0.5px;
    }

    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #ff4444;
      flex-shrink: 0;
    }

    .status-dot.connected {
      background: #339933;
    }

    /* ---- Screens ---- */
    .screen {
      display: none;
      padding: 16px;
    }

    .screen.active {
      display: block;
    }

    /* ---- Setup screen ---- */
    #setup-screen label {
      display: block;
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 10px;
    }

    #bunker-input {
      width: 100%;
      padding: 10px 12px;
      background: #2a2a4a;
      border: 1px solid #444;
      border-radius: 6px;
      color: #e0e0e0;
      font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
      font-size: 13px;
      margin-bottom: 12px;
      outline: none;
    }

    #bunker-input:focus {
      border-color: #339933;
    }

    #bunker-input::placeholder {
      color: #666;
    }

    /* ---- Buttons ---- */
    .btn {
      display: block;
      width: 100%;
      padding: 10px 16px;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    .btn:hover {
      opacity: 0.85;
    }

    .btn:active {
      opacity: 0.7;
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .btn-primary {
      background: #339933;
      color: #fff;
    }

    .btn-danger {
      background: #662222;
      color: #ff8888;
    }

    /* ---- Main screen ---- */
    .section-label {
      font-size: 12px;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 6px;
    }

    .active-persona {
      background: #16213e;
      border-radius: 8px;
      padding: 12px 14px;
      margin-bottom: 16px;
    }

    .persona-name {
      font-size: 16px;
      font-weight: 600;
    }

    .persona-npub {
      font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
      font-size: 12px;
      color: #666;
      margin-top: 2px;
    }

    /* ---- Persona list ---- */
    .persona-list {
      max-height: 180px;
      overflow-y: auto;
      margin-bottom: 16px;
      border-radius: 8px;
      border: 1px solid #2a2a4a;
    }

    .persona-list:empty {
      display: none;
    }

    .persona-item {
      padding: 10px 14px;
      cursor: pointer;
      border-bottom: 1px solid #2a2a4a;
      transition: background 0.1s;
    }

    .persona-item:last-child {
      border-bottom: none;
    }

    .persona-item:hover {
      background: #2a2a4a;
    }

    .persona-item.active {
      background: #1a3a5a;
    }

    .persona-item .persona-name {
      font-size: 14px;
    }

    .persona-item .persona-npub {
      font-size: 11px;
    }

    /* ---- Derive row ---- */
    .derive-row {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }

    .derive-row input {
      flex: 1;
      padding: 9px 12px;
      background: #2a2a4a;
      border: 1px solid #444;
      border-radius: 6px;
      color: #e0e0e0;
      font-size: 13px;
      outline: none;
    }

    .derive-row input:focus {
      border-color: #339933;
    }

    .derive-row input::placeholder {
      color: #666;
    }

    .derive-row .btn {
      width: auto;
      flex-shrink: 0;
      padding: 9px 14px;
      font-size: 13px;
    }

    /* ---- Error area ---- */
    .error-msg {
      display: none;
      background: #3a1111;
      border: 1px solid #ff4444;
      border-radius: 6px;
      padding: 10px 14px;
      margin-top: 12px;
      color: #ff4444;
      font-size: 13px;
      word-break: break-word;
    }

    .error-msg.visible {
      display: block;
    }

    .connect-status {
      display: none;
      text-align: center;
      font-size: 13px;
      color: #888;
      margin-top: 10px;
    }

    .connect-status.visible {
      display: block;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 1; }
    }

    .connect-status.connecting {
      animation: pulse 1.5s ease-in-out infinite;
      color: #339933;
    }

    /* ---- Scrollbar ---- */
    .persona-list::-webkit-scrollbar {
      width: 6px;
    }

    .persona-list::-webkit-scrollbar-track {
      background: transparent;
    }

    .persona-list::-webkit-scrollbar-thumb {
      background: #444;
      border-radius: 3px;
    }

    /* ---- Heartwood badge ---- */
    .heartwood-badge {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      background: #1a3a2a;
      color: #66cc66;
      padding: 2px 6px;
      border-radius: 4px;
      margin-left: auto;
    }

    /* ---- Relay info ---- */
    .relay-info {
      margin: 0 0 12px 0;
    }

    .relay-summary {
      font-size: 12px;
      color: #888;
      cursor: pointer;
      user-select: none;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .relay-summary::before {
      content: '\25B6';
      font-size: 8px;
      transition: transform 0.15s;
    }

    .relay-info.expanded .relay-summary::before {
      transform: rotate(90deg);
    }

    .relay-details {
      display: none;
      margin-top: 6px;
    }

    .relay-info.expanded .relay-details {
      display: block;
    }

    .relay-item {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 3px 0;
      font-size: 12px;
      font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
      color: #999;
    }

    .relay-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
      background: #ff4444;
    }

    .relay-dot.up {
      background: #339933;
    }

    /* Instance cards */
    .instance-list { display: flex; flex-direction: column; gap: 6px; margin-bottom: 12px; }
    .instance-card {
      display: flex; align-items: center; gap: 8px;
      padding: 10px 12px; border-radius: 8px;
      background: #1a1a1a; border: 2px solid #2a2a2a;
      cursor: pointer; transition: border-color 0.15s;
    }
    .instance-card:hover { border-color: #444; }
    .instance-card.active { border-left: 3px solid #1a6b35; background: #0d1a12; }
    .instance-card .inst-name { font-weight: 600; font-size: 0.9rem; }
    .instance-card .inst-npub { font-family: monospace; font-size: 0.72rem; opacity: 0.5; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }
    .instance-card .inst-remove { background: none; border: none; color: #844; cursor: pointer; font-size: 1.1rem; padding: 2px 6px; opacity: 0.5; }
    .instance-card .inst-remove:hover { opacity: 1; }
    .instance-card .inst-status { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .instance-card .inst-status.connected { background: #1a6b35; }
    .instance-card .inst-status.disconnected { background: #8b2020; }
    .instance-card .inst-status.inactive { background: #555; }
    #add-instance-section { margin-top: 8px; }
    #add-instance-section input {
      width: 100%; padding: 8px; background: #111; border: 1px solid #333;
      border-radius: 6px; color: #e0e0e0; font-family: monospace; font-size: 0.85rem;
      margin-bottom: 6px;
    }
    #add-instance-section input:focus { outline: none; border-color: #555; }

    /* ---- Standard bunker card ---- */
    .standard-bunker-card {
      background: #1a1a2e;
      border: 1px dashed #2a2a4a;
      border-radius: 8px;
      padding: 14px;
      margin-bottom: 16px;
      color: #666;
      font-size: 13px;
      text-align: center;
    }

    .standard-bunker-card a {
      color: #66cc66;
      text-decoration: none;
    }

    .standard-bunker-card a:hover {
      text-decoration: underline;
    }

    /* ---- Status dot states ---- */
    .status-dot.reconnecting {
      background: #cc8833;
      animation: pulse 1.5s ease-in-out infinite;
    }

    /* ---- Reconnect area ---- */
    .reconnect-status {
      text-align: center;
      padding: 12px 0;
    }

    .reconnect-msg {
      font-size: 13px;
      color: #888;
    }

    .reconnect-msg.active {
      color: #cc8833;
      animation: pulse 1.5s ease-in-out infinite;
    }

    /* ---- Small buttons ---- */
    .btn-sm {
      padding: 5px 10px;
      border: none;
      border-radius: 4px;
      background: #1a3a2a;
      color: #66cc66;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
    }

    .btn-sm:hover { opacity: 0.85; }

    .btn-save { background: #1a3a2a; color: #66cc66; }
    .btn-add { background: #1a2a3a; color: #6699cc; }

    /* ---- Policy settings ---- */
    .policy-subsection {
      margin: 8px 0 12px 0;
    }

    .policy-label {
      font-size: 11px;
      color: #888;
      margin-bottom: 4px;
    }

    .policy-list {
      display: flex;
      flex-direction: column;
      gap: 2px;
      margin-bottom: 6px;
    }

    .policy-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 8px;
      background: #111;
      border-radius: 4px;
      font-size: 12px;
      font-family: monospace;
    }

    .policy-item .policy-action {
      font-size: 11px;
      padding: 1px 6px;
      border-radius: 3px;
      text-transform: uppercase;
      font-weight: 600;
    }

    .policy-action.allow { background: #1a3a2a; color: #66cc66; }
    .policy-action.ask { background: #3a3a1a; color: #cccc66; }
    .policy-action.deny { background: #3a1a1a; color: #cc6666; }

    .policy-item .policy-remove {
      background: none;
      border: none;
      color: #844;
      cursor: pointer;
      font-size: 14px;
      padding: 0 4px;
      opacity: 0.5;
    }

    .policy-item .policy-remove:hover { opacity: 1; }

    .policy-add-row {
      display: flex;
      gap: 4px;
      align-items: center;
    }

    .policy-add-row input, .policy-add-row select {
      padding: 5px 8px;
      background: #111;
      border: 1px solid #333;
      border-radius: 4px;
      color: #e0e0e0;
      font-size: 12px;
    }

    .policy-add-row select {
      background: #111;
    }
  </style>
</head>
<body>

  <!-- Setup screen: shown when no instances are paired -->
  <div id="setup-screen" class="screen active">
    <div class="header">
      <h1>Bark</h1>
    </div>
    <div style="padding: 16px;">
      <h2 style="margin-bottom: 8px;">Add Heartwood</h2>
      <p style="font-size: 0.82rem; opacity: 0.5; margin-bottom: 12px;">Enter a device address or paste a bunker URI.</p>
      <input id="heartwood-address" type="text" placeholder="heartwood.local:3000 or bunker://..." spellcheck="false" autocomplete="off" style="width:100%; padding:8px; background:#111; border:1px solid #333; border-radius:6px; color:#e0e0e0; font-family:monospace; font-size:0.85rem; margin-bottom:8px;">
      <button class="btn btn-primary" id="pair-btn">Connect</button>
      <div id="pair-error" class="msg msg-err hidden" style="margin-top:8px;"></div>
    </div>
  </div>

  <!-- Main screen: shown when connected -->
  <div id="main-screen" class="screen">
    <div class="header">
      <div id="status-dot" class="status-dot"></div>
      <h1>Bark</h1>
      <span id="heartwood-badge" class="heartwood-badge" style="display:none">Heartwood</span>
    </div>
    <div style="padding: 16px;">
      <div id="instance-list" class="instance-list"></div>
      <div id="add-instance-section" style="display:none;">
        <input id="add-address" type="text" placeholder="Add another Heartwood..." spellcheck="false" autocomplete="off">
        <button class="btn-sm btn-save" id="add-pair-btn">Add</button>
      </div>
      <button class="btn-sm btn-add" id="show-add-btn" style="margin-bottom:12px;">+ Add Heartwood</button>

      <div id="reconnect-status" class="reconnect-status" style="display:none">
        <div id="reconnect-msg" class="reconnect-msg"></div>
        <button id="retry-btn" class="btn btn-primary" style="margin-top:8px;display:none">Retry</button>
      </div>

      <div id="connected-content" style="display:none">
        <div class="section-label">Active persona</div>
        <div class="active-persona">
          <div id="active-name" class="persona-name">--</div>
          <div id="active-npub" class="persona-npub">--</div>
        </div>

        <div id="relay-info" class="relay-info">
          <div class="relay-summary" id="relay-summary">0 relays</div>
          <div class="relay-details" id="relay-details"></div>
        </div>

        <div id="persona-section">
          <div class="section-label">Personas</div>
          <div id="persona-list" class="persona-list"></div>

          <div id="derive-row" class="derive-row">
            <input id="derive-input" type="text" placeholder="purpose name" spellcheck="false">
            <button id="derive-btn" class="btn btn-primary">Derive</button>
          </div>
        </div>

        <div id="standard-bunker-card" class="standard-bunker-card" style="display:none">
          <div class="section-label">Personas</div>
          <p style="margin-top:6px">Persona management requires <a href="https://github.com/forgesworn/heartwood" target="_blank" rel="noopener">Heartwood</a></p>
        </div>

        <!-- Policy settings -->
        <div id="policy-section" style="margin-bottom: 16px;">
          <div class="section-label" style="cursor: pointer; user-select: none;" id="policy-toggle">
            Signing Policies <span id="policy-arrow" style="font-size: 8px;">&#9654;</span>
          </div>
          <div id="policy-content" style="display: none;">
            <div class="policy-subsection">
              <div class="policy-label">Protected kinds (ask before signing)</div>
              <div id="kind-rules-list" class="policy-list"></div>
              <div class="policy-add-row">
                <input id="add-kind-input" type="number" placeholder="Kind number" min="0" max="65535" style="width: 80px;">
                <button id="add-kind-btn" class="btn-sm btn-save">Add</button>
              </div>
            </div>

            <div class="policy-subsection">
              <div class="policy-label">Site rules</div>
              <div id="site-rules-list" class="policy-list"></div>
              <div class="policy-add-row">
                <input id="add-site-input" type="text" placeholder="https://example.com" style="flex: 1;">
                <select id="add-site-action">
                  <option value="allow">Allow</option>
                  <option value="ask">Ask</option>
                  <option value="deny">Deny</option>
                </select>
                <button id="add-site-btn" class="btn-sm btn-save">Add</button>
              </div>
            </div>

            <button id="reset-policies-btn" class="btn-sm" style="margin-top: 8px; color: #888; background: none; border: 1px solid #333; width: 100%;">Reset to defaults</button>
          </div>
        </div>

        <button id="disconnect-btn" class="btn btn-danger">Disconnect</button>
      </div>

      <div id="error-msg" class="error-msg"></div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
